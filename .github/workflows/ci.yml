name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-skills:
    name: Validate Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all SKILL.md files
        run: bash tests/smoke/validate-skills.sh

      - name: Run validator regressions
        run: bash tests/smoke/validate-skill-regressions.sh

      - name: Check project consistency
        run: bash tests/smoke/check-project-consistency.sh

      - name: Verify plugin manifests
        run: |
          # Validate JSON
          python3 -m json.tool .claude-plugin/plugin.json > /dev/null
          python3 -m json.tool .claude-plugin/marketplace.json > /dev/null

          # Verify versions match between plugin.json and marketplace.json
          plugin_version=$(grep '"version"' .claude-plugin/plugin.json | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          marketplace_version=$(grep '"version"' .claude-plugin/marketplace.json | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ "$plugin_version" != "$marketplace_version" ]; then
            echo "::error::Version mismatch: plugin.json=$plugin_version, marketplace.json=$marketplace_version"
            exit 1
          fi
          echo "Versions match: $plugin_version"

          # Verify skills paths use ./ prefix (no ../../ escape)
          if grep -q '\.\./\.\.' .claude-plugin/plugin.json; then
            echo "::error::Plugin manifest must not use ../../ path traversal"
            exit 1
          fi

          # Validate Codex manifest
          python3 -m json.tool .codex-plugin/plugin.json > /dev/null

          # Verify Codex version matches Claude version
          codex_version=$(grep '"version"' .codex-plugin/plugin.json | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ "$plugin_version" != "$codex_version" ]; then
            echo "::error::Version mismatch: Claude=$plugin_version, Codex=$codex_version"
            exit 1
          fi

          # Verify Codex manifest uses ./ paths
          if grep -q '\.\./\.\.' .codex-plugin/plugin.json; then
            echo "::error::Codex manifest must not use ../../ path traversal"
            exit 1
          fi

          # Verify .codex/INSTALL.md exists
          if [ ! -f .codex/INSTALL.md ]; then
            echo "::error::Missing .codex/INSTALL.md"
            exit 1
          fi

