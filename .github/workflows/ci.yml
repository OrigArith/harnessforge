name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-skills:
    name: Validate Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all SKILL.md files
        run: bash tests/smoke/validate-skills.sh

      - name: Run validator regressions
        run: bash tests/smoke/validate-skill-regressions.sh

      - name: Check project consistency
        run: bash tests/smoke/check-project-consistency.sh

      - name: Verify plugin manifests
        run: |
          # Validate JSON
          python3 -m json.tool .claude-plugin/plugin.json > /dev/null
          python3 -m json.tool .codex-plugin/plugin.json > /dev/null

          # Check versions match
          claude_version=$(grep '"version"' .claude-plugin/plugin.json | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          codex_version=$(grep '"version"' .codex-plugin/plugin.json | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ "$claude_version" != "$codex_version" ]; then
            echo "::error::Version mismatch: Claude=$claude_version, Codex=$codex_version"
            exit 1
          fi
          echo "Versions match: $claude_version"

          # Verify skills paths use ./ prefix (no ../../ escape)
          if grep -q '\.\./\.\.' .claude-plugin/plugin.json .codex-plugin/plugin.json; then
            echo "::error::Plugin manifests must not use ../../ path traversal"
            exit 1
          fi

      - name: Test install script (dry run)
        run: |
          # Verify script parses without error
          bash -n scripts/install.sh
          echo "Install script syntax OK"
